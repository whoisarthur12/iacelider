<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente IA - CELIDER</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 650px; margin: 30px auto; padding: 20px; background-color: #f0f2f5; color: #333; }
        .chat-container { background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; }
        h2 { margin-top: 0; color: #1a365d; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        #chatbox { width: 100%; height: 350px; border: 1px solid #e2e8f0; padding: 15px; background: #fafafa; overflow-y: auto; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        .msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; max-width: 85%; inline-size: max-content; max-width: -webkit-fill-available; }
        .user-msg { background-color: #ebf8ff; color: #2b6cb0; margin-left: auto; text-align: right; }
        .ia-msg { background-color: #f0fff4; color: #22543d; border-left: 4px solid #38a169; white-space: pre-line; }
        .sugerencias-container { margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .btn-sugerencia { background: #edf2f7; border: 1px solid #cbd5e0; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .btn-sugerencia:hover { background: #e2e8f0; color: #1a365d; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 1rem; }
        button { padding: 12px 24px; background: #1a365d; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        button:hover { background: #2a4365; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>🤖 Asistente Inteligente CELIDER</h2>
    
    <div id="chatbox"></div>
    
    <div class="sugerencias-container" id="sugerencias"></div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe tu pregunta sobre el manual..." onkeypress="if(event.key === 'Enter') enviarPregunta()">
        <button onclick="enviarPregunta()">Preguntar</button>
    </div>
</div>

<script>
    const chatbox = document.getElementById('chatbox');

    // 1. Cargar sugerencias automáticas al iniciar la página
    async function cargarSugerencias() {
        try {
            const res = await fetch('https://iacelider-production.up.railway.app/api/sugerencias');
            const data = await res.json();
            const contenedor = document.getElementById('sugerencias');
            
            data.sugerencias.forEach(sug => {
                const boton = document.createElement('button');
                boton.className = 'btn-sugerencia';
                boton.innerText = sug;
                boton.onclick = () => {
                    document.getElementById('userInput').value = sug;
                    enviarPregunta();
                };
                contenedor.appendChild(boton);
            });
        } catch (err) {
            console.error("No se pudieron cargar las sugerencias:", err);
        }
    }

    // 2. Enviar pregunta al backend
    async function enviarPregunta() {
        const input = document.getElementById('userInput');
        const preguntaTexto = input.value.trim();
        
        if (!preguntaTexto) return;

        // Mostrar pregunta del usuario
        chatbox.innerHTML += `<div class="msg user-msg"><b>Tú:</b><br>${preguntaTexto}</div>`;
        input.value = '';
        chatbox.scrollTop = chatbox.scrollHeight;

        try {
            // Petición ajustada exactamente a lo que pide tu server.js
            const respuesta = await fetch('https://iacelider-production.up.railway.app/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ pregunta: preguntaTexto }) // Campo "pregunta" correcto
            });

            const data = await respuesta.json();
            
            // Extraer la propiedad "respuesta" del JSON devuelto
            const respuestaIA = data.respuesta || "No recibí una respuesta válida.";
            
            chatbox.innerHTML += `<div class="msg ia-msg"><b>Asistente:</b><br>${respuestaIA}</div>`;
        } catch (error) {
            chatbox.innerHTML += `<div class="msg ia-msg" style="color:red; background:#fff5f5;"><b>Error:</b> Hubo un problema al conectar con el servidor.</div>`;
            console.error("Error:", error);
        }
        
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // Inicializar sugerencias de inmediato
    cargarSugerencias();
</script>

</body>
</html>
